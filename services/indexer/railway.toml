[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @prove/common build && pnpm --filter @prove/indexer db:generate && pnpm --filter @prove/indexer build"
watchPatterns = ["services/indexer/**", "packages/common/**"]

[deploy]
startCommand = "cd services/indexer && pnpm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
