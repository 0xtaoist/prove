[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @prove/common build && pnpm --filter @prove/quest-verifier db:generate && pnpm --filter @prove/quest-verifier build"
watchPatterns = ["services/quest-verifier/**", "packages/common/**"]

[deploy]
startCommand = "cd services/quest-verifier && pnpm start"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
