[build]
builder = "nixpacks"
buildCommand = "pnpm --filter @prove/common build && pnpm --filter @prove/app build"
watchPatterns = ["app/**", "packages/common/**"]

[deploy]
startCommand = "export DATABASE_URL=\"${DATABASE_URL:-postgresql://placeholder:5432/placeholder}\" && cd app && pnpm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
