name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Build Solana Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check programs compile
        run: cargo check --workspace

  typescript:
    name: Build TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build common
        run: pnpm --filter @prove/common build
      - name: Generate Prisma clients
        run: pnpm --filter @prove/indexer db:generate && pnpm --filter @prove/quest-verifier db:generate
      - name: Build app
        run: pnpm --filter @prove/app build
      - name: Build indexer
        run: pnpm --filter @prove/indexer build
      - name: Build quest-verifier
        run: pnpm --filter @prove/quest-verifier build
