name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Build & Audit Solana Programs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Check programs compile
        run: cargo check --workspace
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit Rust dependencies
        # Solana SDK transitive deps have known advisories that require
        # upstream releases. Warn but don't block CI.
        run: cargo audit || echo "::warning::cargo audit found advisories — review before mainnet deploy"

  typescript:
    name: Build & Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build common
        run: pnpm --filter @prove/common build
      - name: Generate Prisma clients
        run: pnpm --filter @prove/indexer db:generate && pnpm --filter @prove/quest-verifier db:generate
      - name: Build app
        run: pnpm --filter @prove/app build
      - name: Build indexer
        run: pnpm --filter @prove/indexer build
      - name: Build quest-verifier
        run: pnpm --filter @prove/quest-verifier build
      - name: Lint
        run: pnpm lint
      - name: Audit npm dependencies
        # Fail on critical vulnerabilities in direct dependencies.
        # Upstream transitive vulns (next.js, walletconnect, lodash) are
        # tracked but don't block CI — they require upstream releases.
        run: pnpm audit --prod --audit-level=critical || echo "::warning::npm audit found vulnerabilities — review before production deploy"
